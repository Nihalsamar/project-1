<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Integration & QR Code Generator</title>

    <!--
      Client-side QR code library (loaded from a CDN).
      This is the static/browser version of the Flask app (web_app.py),
      so it can be hosted for free on GitHub Pages with a live link.
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 1.6rem; }
        .subtitle { text-align: center; color: #777; margin-bottom: 30px; font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
            outline: none;
        }
        input:focus, select:focus { border-color: #667eea; }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9ff;
            border-radius: 15px;
            border: 1px solid #e8eaff;
            display: none; /* hidden until generated */
        }
        .result h2 { color: #333; margin-bottom: 15px; font-size: 1.2rem; text-align: center; }

        .qr-code { text-align: center; margin: 20px 0; }
        .qr-code img, .qr-code canvas {
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #777; font-weight: 500; }
        .detail-value { color: #333; font-weight: 600; max-width: 60%; word-break: break-all; text-align: right; }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            background: #fff3cd;
            color: #856404;
        }

        .security-badge { text-align: center; margin-top: 15px; color: #28a745; font-size: 0.8rem; }
        .security-badge::before { content: "🔒 "; }

        .hint { text-align: center; color: #666; font-size: 0.8rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Payment & QR Generator</h1>
        <p class="subtitle">Generate secure payment QR codes instantly</p>

        <!-- Payment form -->
        <form id="paymentForm">
            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" name="amount" step="0.01" min="1"
                       placeholder="Enter amount (e.g., 499.99)" required>
            </div>

            <div class="form-group">
                <label for="currency">Currency</label>
                <select id="currency" name="currency">
                    <option value="INR">🇮🇳 INR - Indian Rupee</option>
                    <option value="USD">🇺🇸 USD - US Dollar</option>
                    <option value="EUR">🇪🇺 EUR - Euro</option>
                    <option value="GBP">🇬🇧 GBP - British Pound</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Payment Description</label>
                <input type="text" id="description" name="description"
                       placeholder="e.g., Online Course Subscription" required>
            </div>

            <button type="submit">Generate Payment QR Code</button>
        </form>

        <!-- Result section (revealed after generating) -->
        <div class="result" id="result">
            <h2>✅ Payment QR Generated</h2>

            <div class="qr-code" id="qrcode"></div>

            <p class="hint">Scan this QR code with any UPI/payment app to pay</p>

            <div class="detail-row">
                <span class="detail-label">Transaction ID</span>
                <span class="detail-value" id="r_txn"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Amount</span>
                <span class="detail-value" id="r_amount"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Description</span>
                <span class="detail-value" id="r_desc"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value"><span class="status-badge">pending</span></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Created At</span>
                <span class="detail-value" id="r_time"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Token</span>
                <span class="detail-value" id="r_token"></span>
            </div>

            <div class="security-badge">Secured with SHA-256 token verification</div>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────────────────────────
        // Configuration (demo values - in a real app the secret stays server-side)
        // ─────────────────────────────────────────────────────────────────
        const PAYMENT_GATEWAY_BASE_URL = "https://pay.example.com/checkout";
        const MERCHANT_ID = "MERCHANT_12345";
        const SECRET_KEY = "sk_test_demo_key_not_real";

        // Compute a SHA-256 hash in the browser using the Web Crypto API.
        // Returns a 64-char hex string - same idea as Python's hashlib.sha256.
        async function sha256Hex(message) {
            const data = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            const bytes = Array.from(new Uint8Array(hashBuffer));
            return bytes.map(b => b.toString(16).padStart(2, "0")).join("");
        }

        // Handle form submission
        document.getElementById("paymentForm").addEventListener("submit", async (e) => {
            e.preventDefault(); // don't reload the page

            const amount = document.getElementById("amount").value;
            const currency = document.getElementById("currency").value;
            const description = document.getElementById("description").value;

            // 1. Generate a unique transaction ID
            const transactionId = crypto.randomUUID();
            const createdAt = new Date().toISOString();

            // 2. Generate a secure token (proves the data wasn't tampered with)
            const token = await sha256Hex(`${transactionId}${amount}${SECRET_KEY}`);

            // 3. Build the payment URL
            const paymentUrl =
                `${PAYMENT_GATEWAY_BASE_URL}?txn_id=${transactionId}` +
                `&amount=${amount}&currency=${currency}` +
                `&merchant=${MERCHANT_ID}&token=${token}`;

            // 4. Render the QR code (clear any previous one first)
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, {
                text: paymentUrl,
                width: 200,
                height: 200,
                correctLevel: QRCode.CorrectLevel.H
            });

            // 5. Fill in the transaction details
            document.getElementById("r_txn").textContent = transactionId.slice(0, 8) + "...";
            document.getElementById("r_amount").textContent = amount + " " + currency;
            document.getElementById("r_desc").textContent = description;
            document.getElementById("r_time").textContent = createdAt.slice(0, 19);
            document.getElementById("r_token").textContent = token.slice(0, 16) + "...";

            // Reveal the result section
            document.getElementById("result").style.display = "block";
        });
    </script>
</body>
</html>
